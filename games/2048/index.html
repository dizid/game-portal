<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>2048 - Game Portal</title>
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1a1a2e;
        font-family: 'Segoe UI', system-ui, sans-serif;
      }

      #game-container {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 12px;
        touch-action: none;
      }

      /* HUD row */
      #hud {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-shrink: 0;
        user-select: none;
      }

      .hud-box {
        background: rgba(255,255,255,0.07);
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 8px;
        padding: 6px 14px;
        text-align: center;
        min-width: 80px;
      }

      .hud-label {
        font-size: 10px;
        letter-spacing: 1px;
        color: rgba(255,255,255,0.5);
        text-transform: uppercase;
      }

      .hud-value {
        font-size: 20px;
        font-weight: 700;
        color: #fff;
        line-height: 1.2;
      }

      /* Board wrapper — sizes itself in JS */
      #board-wrapper {
        position: relative;
        flex-shrink: 0;
      }

      /* Background grid cells */
      #grid-bg {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        background: #0d0d1a;
        border-radius: 10px;
        padding: 10px;
      }

      .grid-cell {
        background: rgba(255,255,255,0.05);
        border-radius: 6px;
        aspect-ratio: 1;
      }

      /* Tile layer — absolutely positioned over grid-bg */
      #tile-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      /* Individual tiles */
      .tile {
        position: absolute;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 6px;
        font-weight: 800;
        transition: left 80ms ease, top 80ms ease, transform 80ms ease;
        will-change: left, top;
        user-select: none;
      }

      .tile.tile-new {
        animation: tile-appear 120ms ease forwards;
      }

      .tile.tile-merged {
        animation: tile-pop 120ms ease forwards;
      }

      @keyframes tile-appear {
        from { transform: scale(0); }
        to   { transform: scale(1); }
      }

      @keyframes tile-pop {
        0%   { transform: scale(1); }
        50%  { transform: scale(1.18); }
        100% { transform: scale(1); }
      }

      /* Overlay */
      #overlay {
        position: absolute;
        inset: 0;
        border-radius: 10px;
        background: rgba(13,13,26,0.88);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        z-index: 10;
        pointer-events: all;
      }

      #overlay.hidden {
        display: none;
      }

      .overlay-title {
        font-size: clamp(24px, 6vw, 42px);
        font-weight: 900;
        letter-spacing: 2px;
        color: #f5c542;
        text-shadow: 0 0 20px rgba(245,197,66,0.8);
      }

      .overlay-sub {
        font-size: clamp(13px, 3vw, 18px);
        color: rgba(255,255,255,0.75);
        letter-spacing: 1px;
      }

      .overlay-btn {
        padding: 10px 28px;
        border-radius: 8px;
        border: none;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        letter-spacing: 1px;
        background: #f5c542;
        color: #1a1a2e;
        transition: transform 80ms, opacity 80ms;
      }

      .overlay-btn:hover { transform: scale(1.05); }
      .overlay-btn:active { transform: scale(0.97); }

      .overlay-btn.secondary {
        background: transparent;
        border: 1px solid rgba(255,255,255,0.3);
        color: rgba(255,255,255,0.8);
      }
      #mute-btn {
        position: fixed;
        top: 8px;
        right: 8px;
        z-index: 100;
        background: rgba(0,0,0,0.5);
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 6px;
        color: white;
        font-size: 18px;
        width: 36px;
        height: 36px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div id="hud">
        <div class="hud-box">
          <div class="hud-label">Score</div>
          <div class="hud-value" id="score-value">0</div>
        </div>
        <div class="hud-box">
          <div class="hud-label">Best</div>
          <div class="hud-value" id="best-value">0</div>
        </div>
      </div>

      <div id="board-wrapper">
        <div id="grid-bg"></div>
        <div id="tile-layer"></div>
        <div id="overlay">
          <div class="overlay-title">2048</div>
          <div class="overlay-sub">Combine tiles to reach 2048!</div>
          <div class="overlay-sub" style="font-size:12px;opacity:0.55">Arrow keys · WASD · Swipe</div>
          <button class="overlay-btn" id="start-btn">Play</button>
        </div>
      </div>
    </div>
    <button id="mute-btn" aria-label="Toggle sound">🔊</button>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
