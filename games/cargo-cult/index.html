<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Cargo Cult - Game Portal</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #1a0e00; font-family: 'Courier New', monospace; }
      #game-container { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
      #game-canvas { display: block; touch-action: none; cursor: pointer; }
      #hud {
        position: absolute; top: 0; left: 0; width: 100%;
        pointer-events: none; padding: 8px 12px;
        display: flex; justify-content: space-between; align-items: center;
        font-size: 12px; color: #e0c080; user-select: none;
      }
      .hud-box {
        background: rgba(0,0,0,0.5); border: 1px solid rgba(200,160,50,0.3);
        border-radius: 3px; padding: 2px 7px; font-weight: bold;
      }
      #mute-btn {
        position: fixed; top: 8px; right: 8px; z-index: 100;
        background: rgba(0,0,0,0.6); border: 1px solid rgba(200,160,50,0.3);
        border-radius: 6px; color: #e0c080; font-size: 18px;
        width: 36px; height: 36px; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <canvas id="game-canvas"></canvas>
      <div id="hud">
        <div class="hud-box">ROUND <span id="hud-round">1</span>/10</div>
        <div class="hud-box">RAIN <span id="hud-rain">0</span>/10</div>
        <div class="hud-box">STEPS <span id="hud-steps">0</span>/3</div>
      </div>
    </div>
    <button id="mute-btn" aria-label="Toggle sound">🔊</button>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
