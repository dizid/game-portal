<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Checkers - Game Portal</title>
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1a1a2e;
        font-family: 'Courier New', Courier, monospace;
      }

      #game-container {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      #hud {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        max-width: 480px;
        padding: 6px 12px;
        font-size: 13px;
        color: rgba(255,255,255,0.9);
        user-select: none;
      }

      .hud-box {
        background: rgba(0,0,0,0.4);
        border: 1px solid rgba(255,100,100,0.3);
        border-radius: 6px;
        padding: 4px 10px;
        letter-spacing: 0.5px;
      }

      .hud-box span {
        color: #ff6464;
        font-weight: bold;
      }

      #game-canvas {
        display: block;
        touch-action: none;
      }

      #status-bar {
        font-size: 13px;
        color: rgba(255,255,255,0.8);
        background: rgba(0,0,0,0.4);
        border: 1px solid rgba(255,100,100,0.2);
        border-radius: 6px;
        padding: 4px 12px;
        min-height: 26px;
        text-align: center;
        user-select: none;
        max-width: 480px;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div id="hud">
        <div class="hud-box">SCORE <span id="score-value">0</span></div>
        <div class="hud-box">BEST <span id="high-score-value">0</span></div>
      </div>
      <canvas id="game-canvas"></canvas>
      <div id="status-bar">Red to move</div>
    </div>
    <style>
      #mute-btn {
        position: fixed; top: 8px; right: 8px; z-index: 100;
        background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2);
        border-radius: 6px; color: white; font-size: 18px;
        width: 36px; height: 36px; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
      }
    </style>
    <button id="mute-btn" aria-label="Toggle sound">🔊</button>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
