<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Cookie Clicker - Game Portal</title>
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1a1a2e;
        font-family: 'Segoe UI', system-ui, sans-serif;
        color: #fff;
      }

      /* Two-column layout: cookie left, shop right */
      #game-container {
        display: flex;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      /* ── Left panel — cookie ── */
      #left-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 16px;
        min-width: 0;
      }

      #cookie-count {
        font-size: clamp(16px, 4vw, 26px);
        font-weight: 700;
        color: #f5c542;
        text-shadow: 0 0 14px rgba(245,197,66,0.5);
        text-align: center;
        line-height: 1.3;
      }

      #cps-display {
        font-size: clamp(11px, 2.5vw, 15px);
        color: rgba(255,255,255,0.5);
        text-align: center;
      }

      /* Giant cookie button */
      #cookie-btn {
        background: none;
        border: none;
        cursor: pointer;
        padding: 0;
        position: relative;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
        outline: none;
      }

      #cookie-emoji {
        font-size: clamp(80px, 20vw, 150px);
        line-height: 1;
        display: block;
        transition: transform 60ms ease;
        filter: drop-shadow(0 0 20px rgba(245,197,66,0.4));
        will-change: transform;
      }

      #cookie-btn:active #cookie-emoji {
        transform: scale(0.92);
      }

      #cookie-btn.pop #cookie-emoji {
        animation: cookie-pop 120ms ease;
      }

      @keyframes cookie-pop {
        0%   { transform: scale(1); }
        40%  { transform: scale(0.88); }
        80%  { transform: scale(1.06); }
        100% { transform: scale(1); }
      }

      /* Click particles */
      .particle {
        position: fixed;
        pointer-events: none;
        font-size: 1.2em;
        font-weight: 900;
        color: #f5c542;
        text-shadow: 0 0 6px rgba(245,197,66,0.8);
        animation: particle-fly 700ms ease forwards;
        z-index: 100;
      }

      @keyframes particle-fly {
        0%   { opacity: 1; transform: translate(0, 0) scale(1); }
        100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0.6); }
      }

      /* ── Right panel — shop ── */
      #right-panel {
        width: clamp(160px, 38vw, 260px);
        background: rgba(0,0,0,0.35);
        border-left: 1px solid rgba(255,255,255,0.08);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        flex-shrink: 0;
      }

      #shop-title {
        padding: 12px 14px 8px;
        font-size: 12px;
        letter-spacing: 2px;
        color: rgba(255,255,255,0.4);
        text-transform: uppercase;
        border-bottom: 1px solid rgba(255,255,255,0.06);
        flex-shrink: 0;
      }

      #shop-list {
        flex: 1;
        overflow-y: auto;
        padding: 6px;
        display: flex;
        flex-direction: column;
        gap: 5px;
        scrollbar-width: thin;
        scrollbar-color: rgba(255,255,255,0.1) transparent;
      }

      /* Building row */
      .building-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid rgba(255,255,255,0.07);
        background: rgba(255,255,255,0.03);
        cursor: pointer;
        transition: background 120ms, border-color 120ms, opacity 120ms;
        position: relative;
        overflow: hidden;
      }

      .building-row.can-afford {
        border-color: rgba(245,197,66,0.35);
        background: rgba(245,197,66,0.06);
      }

      .building-row.can-afford:hover {
        background: rgba(245,197,66,0.12);
      }

      .building-row.cannot-afford {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .building-row:active.can-afford {
        transform: scale(0.98);
      }

      .building-icon {
        font-size: 1.5em;
        flex-shrink: 0;
      }

      .building-info {
        flex: 1;
        min-width: 0;
      }

      .building-name {
        font-size: 12px;
        font-weight: 600;
        color: rgba(255,255,255,0.85);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .building-desc {
        font-size: 10px;
        color: rgba(255,255,255,0.4);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .building-right {
        text-align: right;
        flex-shrink: 0;
      }

      .building-cost {
        font-size: 11px;
        font-weight: 700;
        color: #f5c542;
      }

      .building-owned {
        font-size: 18px;
        font-weight: 800;
        color: rgba(255,255,255,0.6);
        line-height: 1;
      }

      /* Total baked footer */
      #total-baked {
        padding: 8px 14px;
        font-size: 10px;
        color: rgba(255,255,255,0.3);
        border-top: 1px solid rgba(255,255,255,0.06);
        text-align: center;
        flex-shrink: 0;
      }
      #mute-btn {
        position: fixed;
        top: 8px;
        right: 8px;
        z-index: 100;
        background: rgba(0,0,0,0.5);
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 6px;
        color: white;
        font-size: 18px;
        width: 36px;
        height: 36px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <!-- Left: cookie -->
      <div id="left-panel">
        <div id="cookie-count">0 cookies</div>
        <div id="cps-display">0 per second</div>
        <button id="cookie-btn" aria-label="Click the cookie">
          <span id="cookie-emoji">🍪</span>
        </button>
      </div>

      <!-- Right: shop -->
      <div id="right-panel">
        <div id="shop-title">Buildings</div>
        <div id="shop-list"></div>
        <div id="total-baked">Total baked: <span id="total-baked-value">0</span></div>
      </div>
    </div>
    <button id="mute-btn" aria-label="Toggle sound">🔊</button>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
