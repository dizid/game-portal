<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Drift Challenge - Game Portal</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }

      #game-container {
        position: relative; width: 100%; height: 100%;
        display: flex; align-items: center; justify-content: center;
      }

      #game-canvas { display: block; touch-action: none; }

      /* HUD top */
      #hud {
        position: absolute; top: 0; left: 0; width: 100%;
        pointer-events: none; padding: 8px 14px;
        display: flex; justify-content: space-between; align-items: center;
        font-family: 'Courier New', monospace; font-size: 13px;
        color: rgba(255,255,255,0.9); user-select: none;
      }
      .hud-pill {
        background: rgba(0,0,0,0.55);
        border: 1px solid rgba(255,60,120,0.35);
        border-radius: 6px; padding: 4px 10px;
        text-shadow: 0 0 8px rgba(255,60,120,0.6);
      }
      .hud-pill span { color: #ff3c78; font-weight: bold; }
      #mute-btn {
        position: fixed; top: 8px; right: 8px; z-index: 100;
        background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2);
        border-radius: 6px; color: white; font-size: 18px;
        width: 36px; height: 36px; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
      }

      /* Mobile on-screen controls */
      #touch-controls {
        position: absolute; bottom: 16px; left: 0; width: 100%;
        display: flex; justify-content: space-between; align-items: flex-end;
        padding: 0 16px; pointer-events: none;
        user-select: none;
      }

      .touch-btn {
        pointer-events: all;
        width: 64px; height: 64px;
        background: rgba(255,255,255,0.12);
        border: 2px solid rgba(255,255,255,0.3);
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-size: 22px; color: rgba(255,255,255,0.7);
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
      }

      .steer-group { display: flex; gap: 12px; }
      .gas-group   { display: flex; flex-direction: column; gap: 12px; align-items: flex-end; }
    </style>
  </head>
  <body>
    <div id="game-container">
      <canvas id="game-canvas"></canvas>

      <div id="hud">
        <div class="hud-pill">SCORE <span id="score-value">0</span></div>
        <div class="hud-pill">LAP <span id="lap-value">0/3</span></div>
        <div class="hud-pill">BEST <span id="high-score-value">0</span></div>
      </div>

      <div id="touch-controls">
        <div class="steer-group">
          <button class="touch-btn" id="btn-left">&#8592;</button>
          <button class="touch-btn" id="btn-right">&#8594;</button>
        </div>
        <div class="gas-group">
          <button class="touch-btn" id="btn-gas">&#9650;</button>
          <button class="touch-btn" id="btn-brake">&#9660;</button>
        </div>
      </div>
    </div>
    <button id="mute-btn" aria-label="Toggle sound">🔊</button>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
