<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Fruit Ninja - Game Portal</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        width: 100%; height: 100%;
        background: #1a1a2e;
        font-family: 'Courier New', Courier, monospace;
        color: #e0e0f0;
        overflow: hidden;
      }
      #game-container {
        width: 100%; height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      #hud {
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 48px 8px 12px;
        background: rgba(0,0,0,0.4);
        border-bottom: 1px solid rgba(255,255,255,0.1);
        flex-shrink: 0;
      }
      .hud-item {
        background: rgba(0,0,0,0.4);
        border: 1px solid rgba(255,160,60,0.3);
        border-radius: 6px;
        padding: 4px 10px;
        font-size: 13px;
        letter-spacing: 0.5px;
      }
      .hud-item span { color: #fb923c; font-weight: bold; }
      .lives {
        display: flex;
        gap: 4px;
        align-items: center;
      }
      .life-dot {
        width: 10px; height: 10px;
        border-radius: 50%;
        background: #ef4444;
        transition: opacity 0.2s;
      }
      .life-dot.gone { background: rgba(255,255,255,0.15); }
      #canvas-wrap {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #game-canvas {
        display: block;
        touch-action: none;
        cursor: crosshair;
      }
      #mute-btn {
        position: fixed;
        top: 8px; right: 8px;
        z-index: 100;
        background: rgba(0,0,0,0.5);
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 6px;
        color: white;
        font-size: 18px;
        width: 36px; height: 36px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div id="hud">
        <div class="hud-item">SCORE <span id="score-value">0</span></div>
        <div class="hud-item">TIME <span id="timer-value">60</span>s</div>
        <div class="hud-item lives">
          LIVES
          <div id="lives-display" style="display:flex;gap:4px;margin-left:6px;">
            <div class="life-dot" id="life-0"></div>
            <div class="life-dot" id="life-1"></div>
            <div class="life-dot" id="life-2"></div>
          </div>
        </div>
        <div class="hud-item">BEST <span id="high-score-value">0</span></div>
      </div>
      <div id="canvas-wrap">
        <canvas id="game-canvas"></canvas>
      </div>
    </div>
    <button id="mute-btn" aria-label="Toggle sound">🔊</button>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
