<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Instruction Creep - Game Portal</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; font-family: 'Courier New', monospace; }
      #layout {
        display: flex; width: 100%; height: 100%;
      }
      #sidebar {
        width: 200px; min-width: 160px; height: 100%;
        background: rgba(0,0,0,0.5); border-right: 1px solid #333;
        overflow-y: auto; padding: 8px; flex-shrink: 0;
      }
      #sidebar h3 { color: #ffd700; font-size: 12px; margin-bottom: 6px; text-transform: uppercase; }
      .rule-item { color: #ccc; font-size: 11px; margin-bottom: 4px; padding: 3px 5px; border-left: 2px solid #444; line-height: 1.4; }
      .rule-item.new { border-left-color: #ff6b6b; color: #ff6b6b; }
      #game-area {
        flex: 1; display: flex; flex-direction: column; align-items: center; overflow: hidden; position: relative;
      }
      #rule-banner {
        width: 100%; background: #ff6b6b; color: #000; font-weight: bold;
        font-size: 13px; padding: 4px 8px; text-align: center;
        overflow: hidden; white-space: nowrap; min-height: 24px;
        transition: opacity 0.3s;
      }
      #hud-bar {
        display: flex; justify-content: space-between; align-items: center;
        width: 100%; padding: 6px 12px;
        color: #fff; font-size: 13px; background: rgba(0,0,0,0.4);
      }
      #game-canvas { display: block; touch-action: none; flex: 1; max-height: calc(100vh - 80px); }
      #mute-btn {
        position: fixed; top: 8px; right: 8px; z-index: 100;
        background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.2);
        border-radius: 6px; color: #fff; font-size: 18px;
        width: 36px; height: 36px; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
      }
      @media (max-width: 480px) {
        #sidebar { width: 120px; min-width: 100px; }
        .rule-item { font-size: 9px; }
      }
    </style>
  </head>
  <body>
    <div id="layout">
      <div id="sidebar">
        <h3>Active Rules</h3>
        <div id="rules-list"></div>
      </div>
      <div id="game-area">
        <div id="rule-banner">&nbsp;</div>
        <div id="hud-bar">
          <span>SCORE: <b id="hud-score">0</b></span>
          <span>LIVES: <b id="hud-lives">❤❤❤</b></span>
          <span>NEXT RULE: <b id="hud-timer">30</b>s</span>
        </div>
        <canvas id="game-canvas"></canvas>
      </div>
    </div>
    <button id="mute-btn" aria-label="Toggle sound">🔊</button>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
