<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Keynesian Beauty</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; }
    #game-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
      touch-action: none;
    }
    #mute-btn {
      position: fixed;
      top: 12px;
      right: 12px;
      width: 36px;
      height: 36px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      color: white;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      user-select: none;
    }
    #mute-btn:hover { background: rgba(255,255,255,0.22); }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="canvas"></canvas>
  </div>
  <button id="mute-btn" title="Toggle mute">🔊</button>
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
