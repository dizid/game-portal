<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Match-3 - Game Portal</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        width: 100%;
        height: 100%;
        background: #1a1a2e;
        color: #fff;
        font-family: 'Segoe UI', system-ui, sans-serif;
        overflow: hidden;
        user-select: none;
      }

      #app {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding: 8px 8px 4px;
        gap: 8px;
      }

      /* ── HUD ── */
      #hud {
        width: 100%;
        max-width: 420px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 10px;
        padding: 7px 14px;
        flex-shrink: 0;
      }

      .hud-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1px;
      }

      .hud-label {
        font-size: 0.58rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.45);
      }

      .hud-value {
        font-size: 1.25rem;
        font-weight: 800;
        font-variant-numeric: tabular-nums;
        min-width: 4ch;
        text-align: center;
      }

      #score-display { color: #ffd166; }
      #timer-display { color: #ff6b6b; }
      #combo-display { color: #a78bfa; }

      /* Timer bar */
      #timer-bar-wrap {
        width: 100%;
        max-width: 420px;
        height: 6px;
        background: rgba(255,255,255,0.1);
        border-radius: 3px;
        flex-shrink: 0;
        overflow: hidden;
      }

      #timer-bar {
        height: 100%;
        background: linear-gradient(90deg, #ff6b6b, #ffd166);
        border-radius: 3px;
        transition: width 0.3s linear, background 0.5s;
        width: 100%;
      }

      /* ── Canvas ── */
      #canvas-wrap {
        flex: 1;
        width: 100%;
        max-width: 420px;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 0;
      }

      #game-canvas {
        display: block;
        border-radius: 10px;
        touch-action: none;
        cursor: pointer;
      }

      /* ── Overlay ── */
      #overlay {
        position: fixed;
        inset: 0;
        background: rgba(26, 26, 46, 0.88);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 50;
        backdrop-filter: blur(4px);
      }
      #overlay.hidden { display: none; }

      .overlay-card {
        background: #16213e;
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 16px;
        padding: 28px 32px;
        text-align: center;
        max-width: 300px;
        width: 90%;
        display: flex;
        flex-direction: column;
        gap: 12px;
        align-items: center;
      }

      .overlay-card h2 {
        font-size: 1.8rem;
        font-weight: 800;
        letter-spacing: 0.08em;
      }

      .overlay-card p {
        color: rgba(255,255,255,0.65);
        font-size: 0.88rem;
        line-height: 1.5;
      }

      .score-big {
        font-size: 2.2rem;
        font-weight: 900;
        color: #ffd166;
      }

      .btn {
        padding: 12px 32px;
        background: #a78bfa;
        color: #fff;
        font-weight: 800;
        font-size: 0.95rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.15s, transform 0.05s;
        -webkit-tap-highlight-color: transparent;
      }
      .btn:hover  { background: #c4b5fd; }
      .btn:active { transform: scale(0.96); }

      /* Floating score popup */
      .score-popup {
        position: fixed;
        pointer-events: none;
        font-weight: 900;
        font-size: 1.3rem;
        color: #ffd166;
        text-shadow: 0 0 8px rgba(255,209,102,0.8);
        z-index: 60;
        animation: score-float 0.9s ease forwards;
      }

      @keyframes score-float {
        0%   { opacity: 1; transform: translateY(0) scale(1); }
        100% { opacity: 0; transform: translateY(-60px) scale(1.3); }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="hud">
        <div class="hud-item">
          <span class="hud-label">Score</span>
          <span class="hud-value" id="score-display">0</span>
        </div>
        <div class="hud-item">
          <span class="hud-label">Combo</span>
          <span class="hud-value" id="combo-display">x1</span>
        </div>
        <div class="hud-item">
          <span class="hud-label">Time</span>
          <span class="hud-value" id="timer-display">60</span>
        </div>
      </div>

      <div id="timer-bar-wrap">
        <div id="timer-bar"></div>
      </div>

      <div id="canvas-wrap">
        <canvas id="game-canvas"></canvas>
      </div>
    </div>

    <div id="overlay">
      <div class="overlay-card" id="overlay-card"></div>
    </div>

    <style>
      #mute-btn {
        position: fixed; top: 8px; right: 8px; z-index: 100;
        background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2);
        border-radius: 6px; color: white; font-size: 18px;
        width: 36px; height: 36px; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
      }
    </style>
    <button id="mute-btn" aria-label="Toggle sound">🔊</button>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
