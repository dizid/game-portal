<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Memory Match - Game Portal</title>
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1a1a2e;
        font-family: 'Segoe UI', system-ui, sans-serif;
      }

      #game-container {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 12px;
        user-select: none;
      }

      /* HUD */
      #hud {
        display: flex;
        gap: 10px;
        flex-shrink: 0;
      }

      .hud-box {
        background: rgba(255,255,255,0.07);
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 8px;
        padding: 6px 14px;
        text-align: center;
        min-width: 72px;
      }

      .hud-label {
        font-size: 10px;
        letter-spacing: 1px;
        color: rgba(255,255,255,0.5);
        text-transform: uppercase;
      }

      .hud-value {
        font-size: 20px;
        font-weight: 700;
        color: #fff;
        line-height: 1.2;
      }

      /* Card grid */
      #card-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        flex-shrink: 0;
      }

      /* Card */
      .card {
        aspect-ratio: 1;
        cursor: pointer;
        perspective: 600px;
        position: relative;
      }

      .card-inner {
        width: 100%;
        height: 100%;
        position: relative;
        transform-style: preserve-3d;
        transition: transform 300ms ease;
        border-radius: 10px;
      }

      .card.flipped .card-inner,
      .card.matched .card-inner {
        transform: rotateY(180deg);
      }

      .card-face {
        position: absolute;
        inset: 0;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
      }

      /* Back face */
      .card-back {
        background: linear-gradient(135deg, #2d2b55 0%, #1e1c3a 100%);
        border: 2px solid rgba(130,100,255,0.3);
      }

      .card-back-pattern {
        width: 60%;
        height: 60%;
        border: 2px solid rgba(130,100,255,0.4);
        border-radius: 6px;
        background: repeating-linear-gradient(
          45deg,
          rgba(130,100,255,0.08) 0px,
          rgba(130,100,255,0.08) 4px,
          transparent 4px,
          transparent 8px
        );
      }

      /* Front face */
      .card-front {
        background: linear-gradient(135deg, #16213e 0%, #0f3460 100%);
        border: 2px solid rgba(100,200,255,0.3);
        transform: rotateY(180deg);
        font-size: 2em;
      }

      .card.matched .card-front {
        border-color: rgba(0,255,136,0.8);
        box-shadow: 0 0 16px rgba(0,255,136,0.5), inset 0 0 20px rgba(0,255,136,0.08);
        background: linear-gradient(135deg, #0d2b1e 0%, #0a3020 100%);
      }

      /* Overlay */
      #overlay {
        position: absolute;
        inset: 0;
        background: rgba(13,13,26,0.92);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        z-index: 10;
      }

      #overlay.hidden { display: none; }

      .overlay-title {
        font-size: clamp(26px, 6vw, 44px);
        font-weight: 900;
        letter-spacing: 2px;
        color: #a78bfa;
        text-shadow: 0 0 20px rgba(167,139,250,0.8);
      }

      .overlay-sub {
        font-size: clamp(13px, 3vw, 17px);
        color: rgba(255,255,255,0.7);
        letter-spacing: 1px;
        text-align: center;
        padding: 0 20px;
      }

      .overlay-btn {
        padding: 10px 30px;
        border-radius: 8px;
        border: none;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        letter-spacing: 1px;
        background: #a78bfa;
        color: #1a1a2e;
        transition: transform 80ms, opacity 80ms;
      }

      .overlay-btn:hover { transform: scale(1.05); }
      .overlay-btn:active { transform: scale(0.97); }
      #mute-btn {
        position: fixed;
        top: 8px;
        right: 8px;
        z-index: 100;
        background: rgba(0,0,0,0.5);
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 6px;
        color: white;
        font-size: 18px;
        width: 36px;
        height: 36px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div id="hud">
        <div class="hud-box">
          <div class="hud-label">Moves</div>
          <div class="hud-value" id="moves-value">0</div>
        </div>
        <div class="hud-box">
          <div class="hud-label">Time</div>
          <div class="hud-value" id="time-value">0:00</div>
        </div>
        <div class="hud-box">
          <div class="hud-label">Pairs</div>
          <div class="hud-value" id="pairs-value">0/8</div>
        </div>
      </div>

      <div id="card-grid"></div>

      <div id="overlay">
        <div class="overlay-title">Memory Match</div>
        <div class="overlay-sub">Find all 8 pairs!</div>
        <div class="overlay-sub" style="font-size:12px;opacity:0.55">Tap two cards to flip them</div>
        <button class="overlay-btn" id="start-btn">Play</button>
      </div>
    </div>
    <button id="mute-btn" aria-label="Toggle sound">🔊</button>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
