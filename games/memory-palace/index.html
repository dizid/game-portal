<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Memory Palace - Game Portal</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        width: 100%; height: 100%; overflow: hidden;
        background: #1a1020; font-family: 'Courier New', monospace;
      }
      #game-container {
        position: relative; width: 100%; height: 100%;
        display: flex; align-items: center; justify-content: center;
      }
      #game-canvas { display: block; touch-action: none; }
      #hud {
        position: absolute; top: 0; left: 0; width: 100%;
        pointer-events: none; padding: 12px 16px;
        display: flex; justify-content: space-between;
        font-size: 14px; color: rgba(255,255,255,0.9); user-select: none;
      }
      .hud-box {
        background: rgba(0,0,0,0.4); border: 1px solid rgba(200,150,255,0.3);
        border-radius: 6px; padding: 4px 10px;
      }
      .hud-box span { color: #cc88ff; font-weight: bold; }
      #mute-btn {
        position: fixed; top: 8px; right: 8px; z-index: 100;
        background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2);
        border-radius: 6px; color: white; font-size: 18px;
        width: 36px; height: 36px; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <canvas id="game-canvas"></canvas>
      <div id="hud">
        <div class="hud-box">ROUND <span id="round-value">1</span></div>
        <div class="hud-box">SCORE <span id="score-value">0</span></div>
        <div class="hud-box">LIVES <span id="lives-value">3</span></div>
      </div>
    </div>
    <button id="mute-btn" aria-label="Toggle sound">🔊</button>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
