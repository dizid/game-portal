<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Minesweeper - Game Portal</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        width: 100%;
        height: 100%;
        background: #1a1a2e;
        color: #fff;
        font-family: 'Segoe UI', system-ui, sans-serif;
        overflow: hidden;
        user-select: none;
      }

      #app {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding: 10px 8px 6px;
        gap: 10px;
      }

      /* ── HUD bar ── */
      #hud {
        width: 100%;
        max-width: 420px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 10px;
        padding: 8px 16px;
        flex-shrink: 0;
      }

      .hud-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
      }

      .hud-label {
        font-size: 0.6rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.45);
      }

      .hud-value {
        font-size: 1.3rem;
        font-weight: 800;
        font-variant-numeric: tabular-nums;
        color: #fff;
        min-width: 3ch;
        text-align: center;
      }

      #mine-count  { color: #ff6b6b; }
      #timer-value { color: #ffd166; }
      #score-value { color: #06d6a0; }

      /* Reset face button */
      #reset-btn {
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 8px;
        width: 44px;
        height: 44px;
        font-size: 1.4rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s, transform 0.05s;
        -webkit-tap-highlight-color: transparent;
      }
      #reset-btn:active { transform: scale(0.9); }
      #reset-btn:hover  { background: rgba(255,255,255,0.14); }

      /* ── Grid ── */
      #board-wrap {
        flex: 1;
        width: 100%;
        max-width: 420px;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 0;
      }

      #board {
        display: grid;
        grid-template-columns: repeat(9, 1fr);
        gap: 2px;
        /* Size dynamically via JS */
        touch-action: none;
      }

      .cell {
        aspect-ratio: 1;
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
        font-size: clamp(0.75rem, 3vw, 1.1rem);
        cursor: pointer;
        transition: background 0.1s, transform 0.05s;
        -webkit-tap-highlight-color: transparent;
        position: relative;
        overflow: hidden;
      }

      /* Unrevealed */
      .cell.hidden {
        background: #2d2d5e;
        border: 1px solid rgba(255,255,255,0.15);
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
      }
      .cell.hidden:active { transform: scale(0.9); }

      /* Flagged */
      .cell.flagged {
        background: #2d2d5e;
        border: 1px solid rgba(255,100,100,0.4);
      }

      /* Revealed empty */
      .cell.revealed {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
      }

      /* Number colors per count */
      .cell.n1 { color: #4fc3f7; }
      .cell.n2 { color: #81c784; }
      .cell.n3 { color: #ff8a65; }
      .cell.n4 { color: #ce93d8; }
      .cell.n5 { color: #ff6b6b; }
      .cell.n6 { color: #4dd0e1; }
      .cell.n7 { color: #f06292; }
      .cell.n8 { color: #aaa; }

      /* Mine revealed */
      .cell.mine-hit  { background: #ff3b3b; }
      .cell.mine-show { background: #3b1f1f; }

      /* Wrong flag */
      .cell.wrong-flag { background: #3b1f1f; }

      /* ── Overlay ── */
      #overlay {
        position: fixed;
        inset: 0;
        background: rgba(26, 26, 46, 0.88);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 50;
        backdrop-filter: blur(4px);
      }
      #overlay.hidden { display: none; }

      .overlay-card {
        background: #16213e;
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 16px;
        padding: 28px 32px;
        text-align: center;
        max-width: 300px;
        width: 90%;
        display: flex;
        flex-direction: column;
        gap: 12px;
        align-items: center;
      }

      .overlay-card h2 {
        font-size: 1.8rem;
        font-weight: 800;
        letter-spacing: 0.08em;
      }

      .overlay-card p {
        color: rgba(255,255,255,0.65);
        font-size: 0.88rem;
        line-height: 1.4;
      }

      .score-big {
        font-size: 2rem;
        font-weight: 900;
        color: #06d6a0;
      }

      .btn {
        padding: 12px 32px;
        background: #06d6a0;
        color: #1a1a2e;
        font-weight: 800;
        font-size: 0.95rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.15s, transform 0.05s;
        -webkit-tap-highlight-color: transparent;
      }
      .btn:hover  { background: #05edb1; }
      .btn:active { transform: scale(0.96); }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="hud">
        <div class="hud-item">
          <span class="hud-label">Mines</span>
          <span class="hud-value" id="mine-count">10</span>
        </div>
        <button id="reset-btn" title="New game">&#x1F642;</button>
        <div class="hud-item">
          <span class="hud-label">Time</span>
          <span class="hud-value" id="timer-value">0</span>
        </div>
        <div class="hud-item">
          <span class="hud-label">Score</span>
          <span class="hud-value" id="score-value">—</span>
        </div>
      </div>

      <div id="board-wrap">
        <div id="board"></div>
      </div>
    </div>

    <div id="overlay">
      <div class="overlay-card" id="overlay-card"></div>
    </div>

    <style>
      #mute-btn {
        position: fixed; top: 8px; right: 8px; z-index: 100;
        background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2);
        border-radius: 6px; color: white; font-size: 18px;
        width: 36px; height: 36px; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
      }
    </style>
    <button id="mute-btn" aria-label="Toggle sound">🔊</button>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
