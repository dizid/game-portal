<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Signal Decay - Game Portal</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        width: 100%; height: 100%; overflow: hidden;
        background: #1a1a2e; font-family: 'Courier New', monospace;
      }
      #game-container {
        position: relative; width: 100%; height: 100%;
        display: flex; align-items: center; justify-content: center;
      }
      #game-canvas { display: block; touch-action: none; }
      #hud {
        position: absolute; top: 0; left: 0; width: 100%;
        pointer-events: none; padding: 12px 16px;
        display: flex; justify-content: space-between; align-items: flex-start;
        font-size: 14px; color: rgba(255,255,255,0.9);
        text-shadow: 0 0 8px rgba(0,255,200,0.8); user-select: none;
      }
      .hud-box {
        background: rgba(0,0,0,0.4); border: 1px solid rgba(0,255,200,0.3);
        border-radius: 6px; padding: 4px 10px; letter-spacing: 0.5px;
      }
      .hud-box span { color: #00ffc8; font-weight: bold; }
      #mute-btn {
        position: fixed; top: 8px; right: 8px; z-index: 100;
        background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2);
        border-radius: 6px; color: white; font-size: 18px;
        width: 36px; height: 36px; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
      }
      /* Text input overlay for typing corrections */
      #char-input {
        position: fixed; top: -100px; left: -100px; width: 1px; height: 1px;
        opacity: 0; pointer-events: none;
        background: transparent; border: none; outline: none;
        color: transparent; caret-color: transparent;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <canvas id="game-canvas"></canvas>
      <div id="hud">
        <div class="hud-box">RELAYS <span id="score-value">0</span></div>
        <div class="hud-box">BEST <span id="best-value">0</span></div>
      </div>
    </div>
    <button id="mute-btn" aria-label="Toggle sound">🔊</button>
    <input id="char-input" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
