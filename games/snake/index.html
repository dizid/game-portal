<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Snake - Game Portal</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1a1a2e;
      }

      #game-container {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #game-canvas {
        display: block;
        /* Canvas sizing is handled in JS to maintain aspect ratio */
        touch-action: none; /* Prevent browser swipe gestures */
      }

      /* HUD overlaid on top of the canvas */
      #hud {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        pointer-events: none;
        padding: 12px 16px;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        font-family: 'Courier New', Courier, monospace;
        font-size: 14px;
        color: rgba(255, 255, 255, 0.9);
        text-shadow: 0 0 8px rgba(0, 255, 136, 0.8);
        user-select: none;
      }

      #hud-score,
      #hud-high-score {
        background: rgba(0, 0, 0, 0.4);
        border: 1px solid rgba(0, 255, 136, 0.3);
        border-radius: 6px;
        padding: 4px 10px;
        letter-spacing: 0.5px;
      }

      #hud-score span,
      #hud-high-score span {
        color: #00ff88;
        font-weight: bold;
      }
      #mute-btn {
        position: fixed;
        top: 8px;
        right: 8px;
        z-index: 100;
        background: rgba(0,0,0,0.5);
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 6px;
        color: white;
        font-size: 18px;
        width: 36px;
        height: 36px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <canvas id="game-canvas"></canvas>
      <div id="hud">
        <div id="hud-score">SCORE <span id="score-value">0</span></div>
        <div id="hud-high-score">BEST <span id="high-score-value">0</span></div>
      </div>
    </div>
    <button id="mute-btn" aria-label="Toggle sound">🔊</button>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
