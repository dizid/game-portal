<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Solitaire - Game Portal</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1a1a2e;
        font-family: 'Courier New', Courier, monospace;
        color: #fff;
      }

      #game-container {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        overflow: hidden;
      }

      /* HUD */
      #hud {
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 6px 10px;
        flex-shrink: 0;
        gap: 6px;
      }

      .hud-pill {
        background: rgba(0,0,0,0.4);
        border: 1px solid rgba(100,200,255,0.3);
        border-radius: 6px;
        padding: 3px 8px;
        font-size: 12px;
        letter-spacing: 0.5px;
        white-space: nowrap;
      }

      .hud-pill span {
        color: #64c8ff;
        font-weight: bold;
      }

      /* Canvas fills remaining space */
      #game-canvas {
        display: block;
        touch-action: none;
        flex-shrink: 0;
      }

      /* Overlays */
      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(10,10,20,0.92);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        z-index: 10;
      }

      .overlay.hidden {
        display: none;
      }

      .overlay h1 {
        font-size: 28px;
        color: #64c8ff;
        text-shadow: 0 0 16px rgba(100,200,255,0.8);
        letter-spacing: 2px;
      }

      .overlay p {
        color: rgba(255,255,255,0.7);
        font-size: 14px;
        text-align: center;
        max-width: 280px;
        line-height: 1.5;
      }

      .btn-primary {
        background: linear-gradient(135deg, #64c8ff 0%, #0088cc 100%);
        color: #000;
        border: none;
        border-radius: 8px;
        padding: 12px 32px;
        font-size: 16px;
        font-weight: bold;
        font-family: 'Courier New', Courier, monospace;
        cursor: pointer;
        letter-spacing: 1px;
        touch-action: manipulation;
      }

      .btn-primary:hover {
        opacity: 0.9;
      }

      #win-score {
        font-size: 22px;
        color: #ffd700;
        font-weight: bold;
      }
      #mute-btn {
        position: fixed; top: 8px; right: 8px; z-index: 100;
        background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2);
        border-radius: 6px; color: white; font-size: 18px;
        width: 36px; height: 36px; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div id="hud">
        <div class="hud-pill">SCORE <span id="score-value">0</span></div>
        <div class="hud-pill">TIME <span id="timer-value">0:00</span></div>
        <div class="hud-pill">BEST <span id="high-score-value">0</span></div>
      </div>
      <canvas id="game-canvas"></canvas>
    </div>

    <!-- READY overlay -->
    <div class="overlay" id="overlay-ready">
      <h1>SOLITAIRE</h1>
      <p>Klondike. Tap a card to select, tap a valid destination to move. Draw from stock. Build suits on foundations.</p>
      <button class="btn-primary" id="btn-start">DEAL</button>
    </div>

    <!-- WIN overlay -->
    <div class="overlay hidden" id="overlay-win">
      <h1 style="color:#ffd700">YOU WIN!</h1>
      <div id="win-score">0</div>
      <p id="win-msg"></p>
      <button class="btn-primary" id="btn-newgame-win">NEW GAME</button>
    </div>

    <!-- GAME OVER overlay (no more moves) -->
    <div class="overlay hidden" id="overlay-gameover">
      <h1 style="color:#ff6b6b">NO MORE MOVES</h1>
      <p id="gameover-score-msg"></p>
      <button class="btn-primary" id="btn-newgame-over">NEW GAME</button>
    </div>

    <button id="mute-btn" aria-label="Toggle sound">🔊</button>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
