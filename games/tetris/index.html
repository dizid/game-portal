<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Tetris - Game Portal</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1a1a2e;
      }

      #game-container {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #game-canvas {
        display: block;
        touch-action: none;
      }

      #hud {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        pointer-events: none;
        padding: 10px 14px;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        font-family: 'Courier New', Courier, monospace;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.9);
        user-select: none;
        gap: 6px;
      }

      .hud-pill {
        background: rgba(0, 0, 0, 0.45);
        border: 1px solid rgba(180, 100, 255, 0.3);
        border-radius: 6px;
        padding: 4px 8px;
        letter-spacing: 0.5px;
        text-shadow: 0 0 8px rgba(180, 100, 255, 0.7);
        white-space: nowrap;
      }

      .hud-pill span {
        color: #b464ff;
        font-weight: bold;
      }
      #mute-btn {
        position: fixed;
        top: 8px;
        right: 8px;
        z-index: 100;
        background: rgba(0,0,0,0.5);
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 6px;
        color: white;
        font-size: 18px;
        width: 36px;
        height: 36px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <canvas id="game-canvas"></canvas>
      <div id="hud">
        <div class="hud-pill">SCORE <span id="score-value">0</span></div>
        <div class="hud-pill">LVL <span id="level-value">1</span></div>
        <div class="hud-pill">LINES <span id="lines-value">0</span></div>
        <div class="hud-pill">BEST <span id="high-score-value">0</span></div>
      </div>
    </div>
    <button id="mute-btn" aria-label="Toggle sound">🔊</button>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
