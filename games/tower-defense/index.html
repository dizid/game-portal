<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Tower Defense - Game Portal</title>
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1a1a2e;
        font-family: 'Courier New', Courier, monospace;
        color: #fff;
      }

      #game-container {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
      }

      /* Top HUD bar */
      #hud {
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 6px 10px;
        background: rgba(0,0,0,0.6);
        border-bottom: 1px solid rgba(255,255,255,0.1);
        font-size: 12px;
        flex-shrink: 0;
        gap: 6px;
        flex-wrap: wrap;
      }

      .hud-item {
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 5px;
        padding: 3px 8px;
        white-space: nowrap;
      }

      .hud-item span {
        font-weight: bold;
      }

      #gold-val   { color: #ffd700; }
      #lives-val  { color: #ff6464; }
      #wave-val   { color: #64d4ff; }
      #score-val  { color: #a0ff80; }

      /* Tower selector bar */
      #tower-bar {
        width: 100%;
        display: flex;
        justify-content: center;
        gap: 6px;
        padding: 5px 8px;
        background: rgba(0,0,0,0.5);
        border-bottom: 1px solid rgba(255,255,255,0.08);
        flex-shrink: 0;
        flex-wrap: wrap;
      }

      .tower-btn {
        background: rgba(255,255,255,0.08);
        border: 2px solid rgba(255,255,255,0.2);
        border-radius: 6px;
        padding: 4px 10px;
        font-size: 11px;
        font-family: 'Courier New', monospace;
        color: #fff;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
        white-space: nowrap;
        user-select: none;
      }

      .tower-btn:hover   { background: rgba(255,255,255,0.18); }
      .tower-btn.active  { border-color: #ffd700; background: rgba(255,215,0,0.15); }

      /* Canvas fills remaining space */
      #game-canvas {
        display: block;
        flex: 1 1 auto;
        touch-action: none;
      }

      /* Start wave / status bar */
      #bottom-bar {
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 5px 10px;
        background: rgba(0,0,0,0.6);
        border-top: 1px solid rgba(255,255,255,0.1);
        flex-shrink: 0;
        gap: 8px;
      }

      #wave-btn {
        background: rgba(100,212,255,0.15);
        border: 1px solid rgba(100,212,255,0.4);
        border-radius: 6px;
        color: #64d4ff;
        font-family: 'Courier New', monospace;
        font-size: 12px;
        padding: 5px 14px;
        cursor: pointer;
        white-space: nowrap;
      }

      #wave-btn:disabled {
        opacity: 0.4;
        cursor: default;
      }

      #status-msg {
        font-size: 11px;
        color: rgba(255,255,255,0.6);
        flex: 1;
        text-align: right;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div id="hud">
        <div class="hud-item">Gold <span id="gold-val">500</span></div>
        <div class="hud-item">Lives <span id="lives-val">20</span></div>
        <div class="hud-item">Wave <span id="wave-val">0</span></div>
        <div class="hud-item">Score <span id="score-val">0</span></div>
        <div class="hud-item">Best <span id="best-val">0</span></div>
      </div>

      <div id="tower-bar">
        <button class="tower-btn active" data-type="arrow">Arrow 50g</button>
        <button class="tower-btn" data-type="cannon">Cannon 100g</button>
        <button class="tower-btn" data-type="ice">Ice 75g</button>
        <button class="tower-btn" data-type="laser">Laser 150g</button>
        <button class="tower-btn" data-type="none">Erase</button>
      </div>

      <canvas id="game-canvas"></canvas>

      <div id="bottom-bar">
        <button id="wave-btn">Start Wave 1</button>
        <div id="status-msg">Place towers, then start the wave</div>
      </div>
    </div>
    <style>
      #mute-btn {
        position: fixed; top: 8px; right: 8px; z-index: 100;
        background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2);
        border-radius: 6px; color: white; font-size: 18px;
        width: 36px; height: 36px; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
      }
    </style>
    <button id="mute-btn" aria-label="Toggle sound">🔊</button>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
