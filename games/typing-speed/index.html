<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Typing Speed - Game Portal</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1a1a2e;
        font-family: 'Courier New', Courier, monospace;
        color: #fff;
      }

      #game-container {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding: 12px;
        gap: 10px;
        overflow: hidden;
      }

      /* HUD row */
      #hud {
        width: 100%;
        max-width: 620px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }

      .hud-pill {
        background: rgba(0, 0, 0, 0.4);
        border: 1px solid rgba(100, 200, 255, 0.3);
        border-radius: 6px;
        padding: 4px 12px;
        font-size: 13px;
        letter-spacing: 0.5px;
        white-space: nowrap;
      }

      .hud-pill span {
        color: #64c8ff;
        font-weight: bold;
      }

      #timer-pill {
        border-color: rgba(255, 200, 50, 0.5);
      }

      #timer-pill span {
        color: #ffd700;
      }

      #timer-pill.urgent span {
        color: #ff6b6b;
        animation: pulse 0.5s infinite alternate;
      }

      @keyframes pulse {
        from { opacity: 1; }
        to   { opacity: 0.5; }
      }

      /* Progress bar */
      #progress-wrap {
        width: 100%;
        max-width: 620px;
        height: 6px;
        background: rgba(255,255,255,0.1);
        border-radius: 3px;
        overflow: hidden;
        flex-shrink: 0;
      }

      #progress-bar {
        height: 100%;
        background: linear-gradient(90deg, #64c8ff, #00ff88);
        border-radius: 3px;
        transition: width 0.1s;
        width: 0%;
      }

      /* Passage display */
      #passage-wrap {
        width: 100%;
        max-width: 620px;
        background: rgba(0, 0, 0, 0.35);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 10px;
        padding: 16px;
        font-size: 18px;
        line-height: 1.6;
        letter-spacing: 0.3px;
        flex-shrink: 0;
        /* Constrain height so it doesn't push the input off screen */
        max-height: 40vh;
        overflow-y: auto;
      }

      /* Char spans inside passage */
      .char {
        color: rgba(255,255,255,0.35);
        transition: color 0.08s;
      }

      .char.correct {
        color: #00ff88;
      }

      .char.wrong {
        color: #ff6b6b;
        text-decoration: underline;
        text-underline-offset: 3px;
      }

      .char.cursor {
        border-left: 2px solid #64c8ff;
        animation: blink 0.8s infinite;
      }

      @keyframes blink {
        0%, 100% { border-color: #64c8ff; }
        50%       { border-color: transparent; }
      }

      /* Input field */
      #type-input {
        width: 100%;
        max-width: 620px;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(100,200,255,0.3);
        border-radius: 8px;
        padding: 12px 16px;
        color: #fff;
        font-family: 'Courier New', Courier, monospace;
        font-size: 16px;
        outline: none;
        caret-color: #64c8ff;
        flex-shrink: 0;
      }

      #type-input:focus {
        border-color: rgba(100,200,255,0.7);
        box-shadow: 0 0 12px rgba(100,200,255,0.15);
      }

      #type-input:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      /* Stats row below input */
      #live-stats {
        display: flex;
        gap: 20px;
        font-size: 13px;
        color: rgba(255,255,255,0.5);
        flex-shrink: 0;
      }

      #live-stats span {
        color: #64c8ff;
        font-weight: bold;
      }

      /* Overlays */
      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(10, 10, 20, 0.92);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        z-index: 10;
      }

      .overlay.hidden {
        display: none;
      }

      .overlay h1 {
        font-size: 28px;
        color: #64c8ff;
        text-shadow: 0 0 16px rgba(100, 200, 255, 0.8);
        letter-spacing: 2px;
      }

      .overlay p {
        color: rgba(255,255,255,0.7);
        font-size: 14px;
        text-align: center;
        max-width: 300px;
        line-height: 1.5;
      }

      .stat-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        width: 280px;
      }

      .stat-box {
        background: rgba(0,0,0,0.4);
        border: 1px solid rgba(100,200,255,0.2);
        border-radius: 8px;
        padding: 10px;
        text-align: center;
      }

      .stat-box .stat-val {
        font-size: 26px;
        font-weight: bold;
        color: #64c8ff;
        display: block;
      }

      .stat-box .stat-label {
        font-size: 11px;
        color: rgba(255,255,255,0.5);
        letter-spacing: 1px;
        text-transform: uppercase;
        display: block;
        margin-top: 2px;
      }

      .btn-primary {
        background: linear-gradient(135deg, #64c8ff 0%, #0088cc 100%);
        color: #000;
        border: none;
        border-radius: 8px;
        padding: 12px 32px;
        font-size: 16px;
        font-weight: bold;
        font-family: 'Courier New', Courier, monospace;
        cursor: pointer;
        letter-spacing: 1px;
        touch-action: manipulation;
      }

      .btn-primary:hover {
        opacity: 0.9;
      }
      #mute-btn {
        position: fixed; top: 8px; right: 8px; z-index: 100;
        background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2);
        border-radius: 6px; color: white; font-size: 18px;
        width: 36px; height: 36px; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div id="hud">
        <div class="hud-pill">WPM <span id="wpm-value">0</span></div>
        <div class="hud-pill" id="timer-pill">TIME <span id="timer-value">60</span>s</div>
        <div class="hud-pill">ACC <span id="acc-value">100</span>%</div>
      </div>

      <div id="progress-wrap">
        <div id="progress-bar"></div>
      </div>

      <div id="passage-wrap">
        <div id="passage-text"></div>
      </div>

      <input
        id="type-input"
        type="text"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="none"
        spellcheck="false"
        placeholder="Start typing to begin..."
        aria-label="Type the passage here"
      />

      <div id="live-stats">
        <div>WPM <span id="live-wpm">0</span></div>
        <div>Accuracy <span id="live-acc">100</span>%</div>
        <div>Score <span id="live-score">0</span></div>
      </div>
    </div>

    <!-- READY overlay -->
    <div class="overlay" id="overlay-ready">
      <h1>TYPING SPEED</h1>
      <p>Type the passage as fast as you can. 60 seconds. Timer starts on first keystroke.</p>
      <button class="btn-primary" id="btn-start">READY</button>
    </div>

    <!-- GAME OVER overlay -->
    <div class="overlay hidden" id="overlay-gameover">
      <h1>TIME'S UP</h1>
      <div class="stat-grid">
        <div class="stat-box">
          <span class="stat-val" id="result-wpm">0</span>
          <span class="stat-label">WPM</span>
        </div>
        <div class="stat-box">
          <span class="stat-val" id="result-acc">0</span>
          <span class="stat-label">Accuracy %</span>
        </div>
        <div class="stat-box">
          <span class="stat-val" id="result-score">0</span>
          <span class="stat-label">Score</span>
        </div>
        <div class="stat-box">
          <span class="stat-val" id="result-best">0</span>
          <span class="stat-label">Best Score</span>
        </div>
      </div>
      <button class="btn-primary" id="btn-restart">PLAY AGAIN</button>
    </div>

    <button id="mute-btn" aria-label="Toggle sound">🔊</button>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
