<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Whack-a-Mole - Game Portal</title>
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1a1a2e;
        font-family: 'Segoe UI', system-ui, sans-serif;
      }

      #game-container {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        padding: 12px;
        user-select: none;
      }

      /* HUD */
      #hud {
        display: flex;
        gap: 10px;
        flex-shrink: 0;
      }

      .hud-box {
        background: rgba(255,255,255,0.07);
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 8px;
        padding: 6px 14px;
        text-align: center;
        min-width: 72px;
      }

      .hud-label {
        font-size: 10px;
        letter-spacing: 1px;
        color: rgba(255,255,255,0.5);
        text-transform: uppercase;
      }

      .hud-value {
        font-size: 20px;
        font-weight: 700;
        color: #fff;
        line-height: 1.2;
      }

      #timer-value.urgent { color: #ff4466; animation: pulse-red 0.5s ease infinite alternate; }
      @keyframes pulse-red { to { text-shadow: 0 0 12px #ff4466; } }

      /* Mole grid */
      #mole-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        flex-shrink: 0;
      }

      /* Hole */
      .hole {
        position: relative;
        cursor: pointer;
        overflow: hidden;
        border-radius: 50%;
        background: radial-gradient(ellipse at 40% 35%, #2d1a0e 0%, #0e0a05 70%);
        border: 3px solid rgba(100,60,20,0.5);
        box-shadow: inset 0 6px 18px rgba(0,0,0,0.8), 0 0 0 2px rgba(80,50,20,0.3);
        display: flex;
        align-items: flex-end;
        justify-content: center;
        padding-bottom: 4px;
        transition: transform 80ms;
      }

      .hole:active { transform: scale(0.96); }

      /* Mole inside hole */
      .mole {
        position: absolute;
        bottom: -100%;  /* hidden below */
        left: 50%;
        transform: translateX(-50%);
        font-size: 2em;
        line-height: 1;
        transition: bottom 150ms ease-out;
        pointer-events: none;
        text-align: center;
        filter: drop-shadow(0 -2px 6px rgba(255,200,100,0.4));
      }

      .mole.visible {
        bottom: 4px;
      }

      /* Whack burst animation */
      .hole.whacked .mole {
        animation: whack-anim 250ms ease forwards;
      }

      @keyframes whack-anim {
        0%   { transform: translateX(-50%) scale(1); opacity: 1; }
        40%  { transform: translateX(-50%) scale(0.6); opacity: 0.8; }
        100% { transform: translateX(-50%) scale(0); opacity: 0; }
      }

      /* Star burst on whack */
      .star-burst {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 1.6em;
        pointer-events: none;
        animation: burst 400ms ease forwards;
        z-index: 5;
      }

      @keyframes burst {
        0%   { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
        60%  { opacity: 1; transform: translate(-50%, -80%) scale(1.2); }
        100% { opacity: 0; transform: translate(-50%, -120%) scale(0.8); }
      }

      /* Score pop */
      .score-pop {
        position: absolute;
        top: 10%;
        left: 50%;
        transform: translateX(-50%);
        font-size: 1.1em;
        font-weight: 900;
        pointer-events: none;
        animation: score-float 700ms ease forwards;
        z-index: 6;
        text-shadow: 0 0 6px currentColor;
      }

      @keyframes score-float {
        0%   { opacity: 1; transform: translateX(-50%) translateY(0); }
        100% { opacity: 0; transform: translateX(-50%) translateY(-40px); }
      }

      /* Overlay */
      #overlay {
        position: absolute;
        inset: 0;
        background: rgba(13,13,26,0.92);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        z-index: 10;
      }

      #overlay.hidden { display: none; }

      .overlay-title {
        font-size: clamp(26px, 6vw, 44px);
        font-weight: 900;
        letter-spacing: 2px;
        color: #fbbf24;
        text-shadow: 0 0 20px rgba(251,191,36,0.8);
      }

      .overlay-sub {
        font-size: clamp(13px, 3vw, 17px);
        color: rgba(255,255,255,0.7);
        letter-spacing: 1px;
        text-align: center;
      }

      .overlay-btn {
        padding: 10px 30px;
        border-radius: 8px;
        border: none;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        letter-spacing: 1px;
        background: #fbbf24;
        color: #1a1a2e;
        transition: transform 80ms;
      }

      .overlay-btn:hover { transform: scale(1.05); }
      .overlay-btn:active { transform: scale(0.97); }
      #mute-btn {
        position: fixed;
        top: 8px;
        right: 8px;
        z-index: 100;
        background: rgba(0,0,0,0.5);
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 6px;
        color: white;
        font-size: 18px;
        width: 36px;
        height: 36px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div id="hud">
        <div class="hud-box">
          <div class="hud-label">Score</div>
          <div class="hud-value" id="score-value">0</div>
        </div>
        <div class="hud-box">
          <div class="hud-label">Time</div>
          <div class="hud-value" id="timer-value">60</div>
        </div>
        <div class="hud-box">
          <div class="hud-label">Best</div>
          <div class="hud-value" id="best-value">0</div>
        </div>
      </div>

      <div id="mole-grid"></div>

      <div id="overlay">
        <div class="overlay-title">Whack-a-Mole</div>
        <div class="overlay-sub">Whack moles, avoid bombs!</div>
        <div class="overlay-sub" style="font-size:12px;opacity:0.55">
          😊 +10 &nbsp;&nbsp; ⭐ +50 &nbsp;&nbsp; 💣 -30
        </div>
        <button class="overlay-btn" id="start-btn">Play</button>
      </div>
    </div>
    <button id="mute-btn" aria-label="Toggle sound">🔊</button>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
