[build]
  command = "npm run build"
  publish = "apps/portal/dist"

# SPA fallback for Vue Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache game assets aggressively
[[headers]]
  for = "/games/*/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
