[build]
  command = "npm run build"
  publish = "apps/portal/dist"

# Game iframe files — serve directly, don't redirect to SPA
[[redirects]]
  from = "/games/*/index.html"
  to = "/games/:splat/index.html"
  status = 200

[[redirects]]
  from = "/games/*/assets/*"
  to = "/games/:splat/assets/:splat"
  status = 200

# SPA fallback for Vue Router (must come AFTER game rules)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Trailing slash canonicalization
[[redirects]]
  from = "/games/"
  to = "/games"
  status = 301
  force = true

[[redirects]]
  from = "/games/:category/"
  to = "/games/:category"
  status = 301
  force = true

# Cache game assets aggressively
[[headers]]
  for = "/games/*/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
